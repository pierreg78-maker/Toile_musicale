<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>La Toile Musicale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #0b0d13;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100dvh;
            cursor: crosshair;
            touch-action: none; /* Empêche le scroll du navigateur sur mobile lors du glissé */
        }
        .btn-retour {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 18px;
            background-color: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            text-decoration: none;
            border-radius: 25px;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            z-index: 10;
        }
        .btn-retour:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <a href="https://pierreg78-maker.github.io/Atelier/" class="btn-retour">← Retour à l'Atelier</a>
    <canvas id="canvasMusique"></canvas>

    <script>
        const canvas = document.getElementById('canvasMusique');
        const ctx = canvas.getContext('2d');

        let audioCtx = null;
        let masterGain = null;
        let formes = [];
        let estEnTrainDeGlisser = false;

        // Variables pour le synthétiseur de violoncelle (glissé)
        let violoncelleOsc = null;
        let violoncelleGain = null;

        const gamme = [130.81, 146.83, 164.81, 196.00, 220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25];

        function redimensionner() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', redimensionner);
        redimensionner();

        function initialiserAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                masterGain.connect(audioCtx.destination);
            }
        }

        // --- CLASSES VISUELLES ---
        class OndePiano {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.rayon = 1;
                this.rayonMax = 100 + Math.random() * 50;
                this.vitesse = 3;
                this.opacite = 1;
                this.teinte = Math.floor(Math.random() * 40) + 180; // Tons bleus/cyan pour le piano
            }
            update() {
                this.rayon += this.vitesse;
                this.opacite = 1 - (this.rayon / this.rayonMax);
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.rayon, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.teinte}, 85%, 65%, ${this.opacite})`;
                ctx.lineWidth = 2.5;
                ctx.stroke();
            }
        }

        class ParticuleVioloncelle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.rayon = 4 + Math.random() * 4;
                this.opacite = 1;
                this.teinte = Math.floor(Math.random() * 40) + 10; // Tons chauds/dorés pour le violoncelle
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.opacite -= 0.02;
                if (this.rayon > 0.1) this.rayon -= 0.05;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.rayon, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.teinte}, 90%, 60%, ${this.opacite})`;
                ctx.fill();
            }
        }

        // --- FONCTIONS SONORES ---
        function jouerNotePiano(y) {
            initialiserAudio();
            const indexGamme = Math.floor((1 - (y / canvas.height)) * gamme.length);
            const freq = gamme[Math.min(Math.max(indexGamme, 0), gamme.length - 1)];

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);

            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.2);
        }

       // Remplacer ces deux fonctions dans votre bloc <script>

function demarrerVioloncelle(y) {
    initialiserAudio();
    if (violoncelleOsc) return;

    // Création de deux oscillateurs pour faire un effet de choeur/vibrato (plus riche)
    violoncelleOsc = audioCtx.createOscillator();
    violoncelleOsc2 = audioCtx.createOscillator(); // Deuxième corde
    violoncelleGain = audioCtx.createGain();

    // L'onde en dents de scie apporte les harmoniques de la corde frottée
    violoncelleOsc.type = 'sawtooth'; 
    violoncelleOsc2.type = 'sawtooth'; 

    // Désaccordage léger pour créer de la texture et du corps (le côté "boisé")
    violoncelleOsc.detune.setValueAtTime(-8, audioCtx.currentTime); // en cents
    violoncelleOsc2.detune.setValueAtTime(8, audioCtx.currentTime);

    // Un filtre plus bas pour couper le son métallique et ne garder que le feutré du violoncelle
    const filtre = audioCtx.createBiquadFilter();
    filtre.type = 'lowpass';
    filtre.frequency.setValueAtTime(380, audioCtx.currentTime); // Filtre plus bas = son plus sombre et boisé
    filtre.Q.setValueAtTime(1, audioCtx.currentTime); // Légère résonance

    const freqInitiale = calculerFrequenceGlisee(y);
    violoncelleOsc.frequency.setValueAtTime(freqInitiale, audioCtx.currentTime);
    violoncelleOsc2.frequency.setValueAtTime(freqInitiale, audioCtx.currentTime);

    violoncelleGain.gain.setValueAtTime(0, audioCtx.currentTime);
    violoncelleGain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.2); // Attaque un peu plus lourde

    violoncelleOsc.connect(filtre);
    violoncelleOsc2.connect(filtre);
    filtre.connect(violoncelleGain);
    violoncelleGain.connect(masterGain);

    violoncelleOsc.start();
    violoncelleOsc2.start();
}

function modifierVioloncelle(y) {
    if (!violoncelleOsc || !violoncelleOsc2) return;
    const freqTarget = calculerFrequenceGlisee(y);
    // Glissement fluide pour les deux oscillateurs
    violoncelleOsc.frequency.setTargetAtTime(freqTarget, audioCtx.currentTime, 0.05);
    violoncelleOsc2.frequency.setTargetAtTime(freqTarget, audioCtx.currentTime, 0.05);
}

// Pensez aussi à modifier 'arreterVioloncelle' pour couper le deuxième oscillateur :
function arreterVioloncelle() {
    if (!violoncelleOsc) return;
    const t = audioCtx.currentTime;
    
    violoncelleGain.gain.cancelScheduledValues(t);
    violoncelleGain.gain.setValueAtTime(violoncelleGain.gain.value, t);
    violoncelleGain.gain.linearRampToValueAtTime(0.001, t + 0.4); // Extinction un peu plus longue
    
    const osc1 = violoncelleOsc;
    const osc2 = violoncelleOsc2;
    setTimeout(() => {
        try { 
            osc1.stop(); 
            osc2.stop(); 
        } catch(e){}
    }, 450);

    violoncelleOsc = null;
    violoncelleOsc2 = null;
    violoncelleGain = null;
}

        function calculerFrequenceGlisee(y) {
            // Permet un glissement continu et non par paliers rigides
            const ratio = 1 - (y / canvas.height);
            const freqMin = gamme[0];
            const freqMax = gamme[gamme.length - 1];
            return freqMin + (freqMax - freqMin) * ratio;
        }

        // --- GESTIONNAIRES D'ÉVÉNEMENTS (Souri & Tactile) ---
        function actionDebut(x, y, target) {
            if (target.classList.contains('btn-retour')) return;
            estEnTrainDeGlisser = false;
            jouerNotePiano(y);
            formes.push(new OndePiano(x, y));
            
            // On prépare le violoncelle si le mouvement commence
            setTimeout(() => { if (estEnTrainDeGlisser) demarrerVioloncelle(y); }, 100);
        }

        function actionMouvement(x, y, target) {
            if (target.classList.contains('btn-retour')) return;
            estEnTrainDeGlisser = true;
            
            if (violoncelleOsc) {
                modifierVioloncelle(y);
                // Générer des poussières d'étoiles dorées pour le glissé
                for(let i=0; i<2; i++) {
                    formes.push(new ParticuleVioloncelle(x, y));
                }
            }
        }

        function actionFin() {
            estEnTrainDeGlisser = false;
            arreterVioloncelle();
        }

        // Événements Souris
        window.addEventListener('mousedown', (e) => actionDebut(e.clientX, e.clientY, e.target));
        window.addEventListener('mousemove', (e) => { if (e.buttons === 1) actionMouvement(e.clientX, e.clientY, e.target); });
        window.addEventListener('mouseup', actionFin);

        // Événements Tactiles
        window.addEventListener('touchstart', (e) => {
            const t = e.touches[0];
            actionDebut(t.clientX, t.clientY, e.target);
        });
        window.addEventListener('touchmove', (e) => {
            const t = e.touches[0];
            actionMouvement(t.clientX, t.clientY, e.target);
        });
        window.addEventListener('touchend', actionFin);


        // --- BOUCLE D'ANIMATION ---
        function animer() {
            ctx.fillStyle = 'rgba(11, 13, 19, 0.25)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = formes.length - 1; i >= 0; i--) {
                formes[i].update();
                formes[i].draw();
                if (formes[i].opacite <= 0 || (formes[i].rayon && formes[i].rayon <= 0.1)) {
                    formes.splice(i, 1);
                }
            }
            requestAnimationFrame(animer);
        }
        animer();
    </script>
</body>
</html>
